<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Stomii Studios</title>
    <script>
      (function () {
        var segmentCount = 0;
        var location = window.location;
        var basePath = location.pathname
          .split('/')
          .slice(0, 1 + segmentCount)
          .join('/');
        var redirectPath =
          basePath +
          '/?p=' +
          encodeURIComponent(
            location.pathname
              .slice(1)
              .split('/')
              .slice(segmentCount)
              .join('/')
              .replace(/&/g, '~and~')
          ) +
          (location.search ? '&q=' + location.search.slice(1).replace(/&/g, '~and~') : '') +
          location.hash;

        location.replace(redirectPath);
      })();
    </script>
  </head>
  <body></body>
</html>
